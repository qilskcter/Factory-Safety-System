<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Notifications</title>
    <link rel="stylesheet" href="Assets/css/notifications.css">
</head>

<body>

    <div class="back" onclick="history.back()">
        ← Quay lại trang chủ
    </div>

    <div class="history-header">
        <h1>Toàn bộ lịch sử thông báo</h1>
        <div class="header-actions">
            <button id="darkModeToggle" class="mode-toggle-btn">🌙</button>
            <button id="clearHistoryBtn">Xóa sạch toàn bộ lịch sử</button>
        </div>
    </div>

    <div id="list"></div>

    <div id="imageModal">
        <div class="modal-content">
            <span id="closeModalBtn">&times;</span>
            <h3 class="modal-title">Chi tiết hình ảnh xâm nhập vùng cấm</h3>
            
            <div class="modal-body">
                <div class="full-image-container">
                    <p>Ảnh toàn cảnh (Gốc)</p>
                    <img id="modalFullImage" src="" alt="Không có dữ liệu ảnh toàn cảnh">
                </div>
                <div id="cropImageContainer" class="crop-container">
                    <p>Đối tượng</p>
                    <img id="modalCropImage" src="" alt="Không có ảnh cắt">
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "http://192.168.88.15:3000"; 
        const list = document.getElementById("list");
        const clearBtn = document.getElementById("clearHistoryBtn");
        
        let notifications = JSON.parse(localStorage.getItem("notifications")) || [];

        function renderList() {
            if (notifications.length === 0) {
                list.innerHTML = "<p class='empty'>Hệ thống chưa ghi nhận lịch sử thông báo nào.</p>";
                if (clearBtn) clearBtn.style.display = "none";
                return;
            }

            list.innerHTML = "";
            if (clearBtn) clearBtn.style.display = "block";

            [...notifications].reverse().forEach(itemData => {
                const div = document.createElement("div");
                div.className = "item";

                let textMsg = "";
                let fullImg = "";
                let cropImg = "";

                if (typeof itemData === 'object' && itemData !== null) {
                    textMsg = itemData.text || "";
                    fullImg = itemData.image || "";
                    cropImg = itemData.imageCrop || "";
                } else {
                    textMsg = itemData;
                    if (textMsg.includes("Ảnh: ")) {
                        fullImg = textMsg.split("Ảnh: ")[1]?.trim() || "";
                        if (fullImg) {
                            cropImg = fullImg.replace(".jpg", "_crop.jpg");
                        }
                    }
                }

                if (!fullImg && textMsg.includes("<br>Ảnh:")) {
                    textMsg = textMsg.split("<br>Ảnh:")[0];
                }

                div.setAttribute("data-img", fullImg);
                div.setAttribute("data-crop", cropImg);

                div.innerHTML = `
                    <div class="icon">🔔</div>
                    <div class="text">${textMsg}</div>
                `;

                if (fullImg || cropImg) {
                    div.style.cursor = "pointer";
                    div.addEventListener("click", () => {
                        openImageModal(fullImg, cropImg);
                    });
                } else {
                    div.style.cursor = "default";
                }

                list.appendChild(div);
            });
        }

        function openImageModal(fullImg, cropImg) {
            const modal = document.getElementById("imageModal");
            const modalFull = document.getElementById("modalFullImage");
            const modalCrop = document.getElementById("modalCropImage");
            const cropContainer = document.getElementById("cropImageContainer");
            
            const STATIC_IMAGE_PATH = `${BASE_URL}/images/`;

            if (fullImg) {
                modalFull.src = STATIC_IMAGE_PATH + fullImg;
            } else {
                modalFull.src = "";
                modalFull.alt = "Lượt thông báo này không đính kèm hình ảnh toàn cảnh.";
            }

            if (cropImg) {
                modalCrop.src = STATIC_IMAGE_PATH + cropImg;
                cropContainer.style.display = "block";
            } else {
                modalCrop.src = "";
                cropContainer.style.display = "none";
            }

            modal.style.display = "flex";
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderList();

            const modal = document.getElementById("imageModal");
            const closeBtn = document.getElementById("closeModalBtn");

            if (closeBtn && modal) {
                closeBtn.addEventListener("click", () => modal.style.display = "none");
                window.addEventListener("click", (e) => {
                    if (e.target === modal) modal.style.display = "none";
                });
            }

            if (clearBtn) {
                clearBtn.addEventListener("click", async () => {
                    const confirmClean = confirm("Hành động này sẽ xóa sạch thông báo trên giao diện Web này, xóa file log.txt và toàn bộ ảnh trong thư mục python/images trên server. Bạn có chắc chắn?");
                    if (!confirmClean) return;

                    try {
                        const response = await fetch(`${BASE_URL}/api/clear-all`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" }
                        });
                        const result = await response.json();

                        if (result.success) {
                            notifications = [];
                            localStorage.removeItem("notifications");
                            renderList();
                            alert("Hệ thống đã được dọn dẹp sạch sẽ!");
                        } else {
                            alert("Thất bại: " + result.message);
                        }
                    } catch (err) {
                        console.error("Lỗi dọn dẹp:", err);
                        alert("Không thể kết nối tới máy chủ để dọn dẹp.");
                    }
                });
            }

            // ĐỒNG BỘ DARK MODE
            const darkModeToggle = document.getElementById("darkModeToggle");
            const body = document.body;

            if (localStorage.getItem("darkMode") === "enabled") {
                body.classList.add("dark-mode");
                if (darkModeToggle) darkModeToggle.innerText = "☀️";
            }

            if (darkModeToggle) {
                darkModeToggle.addEventListener("click", () => {
                    body.classList.toggle("dark-mode");
                    if (body.classList.contains("dark-mode")) {
                        localStorage.setItem("darkMode", "enabled");
                        darkModeToggle.innerText = "☀️";
                    } else {
                        localStorage.setItem("darkMode", "disabled");
                        darkModeToggle.innerText = "🌙";
                    }
                });
            }
        });
    </script>

</body>
</html>
